# This workflow uses actions that are not certified by GitHub.  They are
# provided by a third-party and are governed by separate terms of service,
# privacy policy, and support documentation.
#
# This workflow will install a prebuilt Ruby version, install dependencies, and
# run tests and linters.
name: 'Ruby on Rails CI'
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      # Use env overrides consumed by config/database.yml in CI.
      MYSQL_HOST_TEST: 127.0.0.1
      MYSQL_USER_TEST: root
      MYSQL_PASSWORD_TEST: root
      MYSQL_DATABASE_TEST: ohd_archive_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update packages
        run: sudo apt-get update
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
      - name: Install pdflatex
        run: sudo apt-get install texlive-latex-base texlive-xetex texlive-luatex texlive-fonts-extra texlive-lang-other texlive-lang-arabic -y
      - name: Confirm Java version
        run: java -version
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      # Add or replace dependency steps here
      - name: Start MySQL
        run: sudo /etc/init.d/mysql start
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Install node modules
        run: yarn
      - name: Create database
        run: mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS ohd_archive_test;"
      # Add or replace database setup steps here
      - name: Set up database schema
        run: bin/rails db:schema:load
      # Other setup stuff
      - name: Add test domain to /etc/hosts
        run: sudo echo "127.0.0.1 test.portal.oral-history.localhost" | sudo tee -a /etc/hosts
      - name: Start server
        run: bin/start_app &
      - name: Start search engine
        run: bin/start_search &
      - name: Wait for Solr (localhost) to be ready
        run: |
          echo "Waiting for Solr at http://localhost:8983/solr/ ..."
          for i in $(seq 1 120); do
          if curl -sS "http://localhost:8983/solr/" >/dev/null; then
              echo "Solr is up"
              break
          fi
          echo "Solr not ready yet, retrying... ($i)"
          sleep 1
          done
      - name: Run tests
        run: bin/test
      - name: Upload Capybara screenshots
        if: always() # always run, even if tests failed
        uses: actions/upload-artifact@v4
        with:
          name: capybara-screenshots
          path: tmp/screenshots
          if-no-files-found: ignore
      - name: Upload log file on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: tmp/rails-latex/**/input.*
          if-no-files-found: ignore

