services:
  app:
    image: ohd-devcontainer-app:local
    build:
      # With multiple compose files, relative paths resolve from the first file
      # (repo root), so use root-relative paths here.
      context: .
      dockerfile: .devcontainer/Dockerfile
    # Entrypoint runs as root to fix mount ownership; interactive shell runs as vscode.
    entrypoint: ['bash', '/workspace/.devcontainer/scripts/entrypoint.sh']
    command: sleep infinity
    working_dir: /workspace
    ports:
      - '127.0.0.1:3000:3000'
      - '127.0.0.1:3035:3035'
    # Entrypoint runs as root: fixes volume ownership, then exec's sleep infinity.
    # VS Code's remoteUser:vscode ensures all interactive processes run as vscode.
    entrypoint: ['bash', '/workspace/.devcontainer/scripts/entrypoint.sh']
    build:
      context: ../..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      # Exclude node_modules from the mount to prevent host/container conflicts
      - /workspace/node_modules
      - /workspace/tmp/cache
      # Use a named volume for bundle to persist gems across container restarts.
      # On first start Docker auto-populates this from the image's /usr/local/bundle
      # content (pre-installed gems), so bundle install is skipped.
      - bundle-data:/usr/local/bundle
      # Create a volume for logs
      - setup-logs:/workspace/.devcontainer/logs
    extra_hosts:
      - 'portal.oral-history.localhost:127.0.0.1'
      - 'test.portal.oral-history.localhost:127.0.0.1'
    depends_on:
      solr:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RACK_ENV: development
      NODE_ENV: development
      DISABLE_DATABASE_ENVIRONMENT_CHECK: 1
      # Point to Solr container default core
      SOLR_URL: http://solr:8983/solr/default
      SOLR_HOST: solr
      SOLR_PORT: 8983
      DISABLE_SPRING: true
      # Use precompiled platform-specific gems instead of compiling from source
      BUNDLE_FORCE_RUBY_PLATFORM: false
      # Optional: only needed for features backed by encrypted attributes.
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY:-}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT:-}
      # Cap Node.js heap to prevent webpack-dev-server OOM-killing the host.
      # Without this, V8 grows the heap unboundedly over a long dev session.
      NODE_OPTIONS: '--max-old-space-size=2048'

  db:
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ohd_development
    ports:
      - '127.0.0.1:3306:3306'
    healthcheck:
      test:
        [
          'CMD',
          'mysql',
          '-h',
          'db',
          '-u',
          'root',
          '-prootpassword',
          '-e',
          'SELECT 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  solr:
    platform: linux/amd64 # No multi-arch image available, force AMD64
    ports:
      - '127.0.0.1:8983:8983'
    volumes:
      - solr-data:/var/solr
      - ../../solr/configsets:/opt/solr/server/solr/configsets:ro
      - ../scripts/setup-solr.sh:/usr/local/bin/setup-solr.sh:ro
    environment:
      - SOLR_HEAP=512m
    # Use the external script for setup
    entrypoint: ['/bin/bash', '/usr/local/bin/setup-solr.sh']
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-c',
          'curl -s "http://localhost:8983/solr/admin/cores?action=STATUS&wt=json" | grep -q "\"default\"" && curl -s "http://localhost:8983/solr/default/admin/ping?wt=json" | grep -q "\"status\":\"OK\""',
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

volumes:
  db-data:
    name: ohd_dev_db_data
  solr-data:
    name: ohd_dev_solr_data
  redis-data:
    name: ohd_dev_redis_data
  app-cache:
    name: ohd_dev_app_cache
  app-files:
    name: ohd_dev_app_files
  app-logs:
    name: ohd_dev_app_logs
  bundle-data:
    name: ohd_dev_bundle_data
  setup-logs:
    name: ohd_dev_setup_logs

networks:
  ohd-network:
    name: ohd_dev_network
