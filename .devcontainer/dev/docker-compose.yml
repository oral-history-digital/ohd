services:
  app:
    image: ohd-devcontainer-app:local
    build:
      # With multiple compose files, relative paths resolve from the first file
      # (repo root), so use root-relative paths here.
      context: .
      dockerfile: .devcontainer/Dockerfile
    # Entrypoint runs as root to fix mount ownership; interactive shell runs as vscode.
    entrypoint: ['bash', '/workspace/.devcontainer/scripts/entrypoint.sh']
    command: sleep infinity
    working_dir: /workspace
    ports:
      - '3000:3000'
      - '3035:3035'
    volumes:
      - .:/workspace:cached
      # Exclude node_modules from the mount to prevent host/container conflicts
      - /workspace/node_modules
      - /workspace/tmp/cache
      # Use a named volume for bundle to persist gems across container restarts.
      # On first start Docker auto-populates this from the image's /usr/local/bundle
      # content (pre-installed gems), so bundle install is skipped.
      - bundle-data:/usr/local/bundle
      # Create a volume for logs
      - setup-logs:/workspace/.devcontainer/logs
    extra_hosts:
      - 'portal.oral-history.localhost:127.0.0.1'
      - 'test.portal.oral-history.localhost:127.0.0.1'
    depends_on:
      solr:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RACK_ENV: development
      NODE_ENV: development
      DISABLE_DATABASE_ENVIRONMENT_CHECK: 1
      # Point to Solr container default core
      SOLR_URL: http://solr:8983/solr/default
      SOLR_HOST: solr
      SOLR_PORT: 8983
      DISABLE_SPRING: true
      # Use precompiled platform-specific gems instead of compiling from source
      BUNDLE_FORCE_RUBY_PLATFORM: false
      # Cap Node.js heap to prevent webpack-dev-server OOM-killing the host.
      # Without this, V8 grows the heap unboundedly over a long dev session.
      NODE_OPTIONS: '--max-old-space-size=2048'

  db:
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ohd_development
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword

  solr:
    platform: linux/amd64 # No multi-arch image available, force AMD64
    ports:
      - '8983:8983'

  redis:
    ports:
      - '6379:6379'

volumes:
  db-data:
    name: ohd_dev_db_data
  solr-data:
    name: ohd_dev_solr_data
  redis-data:
    name: ohd_dev_redis_data
  app-cache:
    name: ohd_dev_app_cache
  app-files:
    name: ohd_dev_app_files
  app-logs:
    name: ohd_dev_app_logs
  bundle-data:
    name: ohd_dev_bundle_data
  setup-logs:
    name: ohd_dev_setup_logs

networks:
  ohd-network:
    name: ohd_dev_network
