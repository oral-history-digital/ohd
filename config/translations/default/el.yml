  devise.mailer.revoke_project_access_block.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eσας ενημερώνουμε ότι η πρόσβαση στην εφαρμογή %{project_name} έχει αποκατασταθεί.\u003c/p\u003e\u003cp\u003eΜπορείτε πλέον να έχετε πρόσβαση στην εφαρμογή %{project_name}.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
