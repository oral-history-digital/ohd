  devise.mailer.block.subject: "Αποκλεισμός του λογαριασμού σας "
  devise.mailer.block.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eΣας ενημερώνουμε ότι η πρόσβασή σας στην πλατφόρμα 'Oral-History.Digital' έχει μπλοκαριστεί. Αυτό συμβαίνει επειδή δεν έχουν τηρηθεί οι %{tos_link}.\u003c/p\u003e\u003cp\u003eΕάν έχετε οποιαδήποτε απορία, παρακαλούμε επικοινωνήστε μαζί μας στο %{mail_to}.\u003c/p\u003e\u003cp\u003e Με εκτίμηση\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.block_project_access.subject: "Αποκλεισμός του λογαριασμού σας"
  devise.mailer.block_project_access.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eΣας ενημερώνουμε ότι η πρόσβασή σας στην εφαρμογή '%{project_name}' έχει μπλοκαριστεί. Αυτό οφείλεται στη μη συμμόρφωση με τους %{tos_link} του αρχείου.\u003c/p\u003e\u003cp\u003eΕάν έχετε οποιαδήποτε απορία, παρακαλούμε επικοινωνήστε μαζί μας στο %{mail_to}.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003cp\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.confirmation_instructions.subject: "Επιβεβαίωση της εγγραφής σας στο Oral-History.Digital"
  devise.mailer.corrected_project_access_data.subject: "Korrigierte Benutzerdaten zur Prüfung"
  devise.mailer.grant_project_access.subject: "Ενεργοποίηση της πρόσβασής σας στην εφαρμογή '%{project_name}'"
  devise.mailer.grant_project_access.text: "\u003cp\u003eΚαλημέρα %{user_display_name},\u003c/p\u003e\u003cp\u003eΈχετε πλέον πρόσβαση στην εφαρμογή '%{project_link}' για το αίτημα έρευνας που καθορίσατε.\u003c/p\u003e\u003cp\u003eΠαρακαλούμε να σεβαστείτε τα προσωπικά δικαιώματα των συνεντευξιαζόμενων και τους όρους χρήσης %{tos_link} του αρχείου.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.new_email_confirmation_instructions.subject: "Bestätigung Ihrer neuen E-Mail-Adresse für Oral-History.Digital"
  devise.mailer.new_registration_info.subject: "Neuer Freischaltungsantrag zur Prüfung"
  devise.mailer.project_access_granted.subject: "Ενεργοποίηση του λογαριασμού σας για την εφαρμογή '%{project_name}'"
  devise.mailer.project_access_rejected.subject: "Η εγγραφή σας στην εφαρμογή '%{project_name}'"
  devise.mailer.project_access_terminated.subject: "Η πρόσβασή σας στην εφαρμογή '%{project_name}'"
  devise.mailer.reject_project_access.subject: "Το αίτημά σας για ενεργοποίηση της εφαρμογής '%{project_name}'"
  devise.mailer.reject_project_access.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eΖητήσατε ενεργοποίηση της εφαρμογής '%{project_name}'.\u003c/p\u003e\u003cp\u003eΔυστυχώς, ελέγξαμε τα στοιχεία σας και διαπιστώσαμε ότι είναι ανεπαρκή ή δεν συμμορφώνονται με τους %{tos_link}.\u003c/p\u003e\u003cp\u003eΜπορείτε να αλλάξετε ή να συμπληρώσετε τα στοιχεία σας στον ακόλουθο σύνδεσμο.\u003c/p\u003e\u003cp\u003e%{correct_link}\u003c/p\u003e\u003cp\u003eΕάν χρειάζεστε βοήθεια, επικοινωνήστε μαζί μας στο %{mail_to}.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.remove.subject: "Διαγραφή του λογαριασμού σας"
  devise.mailer.remove.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eΣας ενημερώνουμε ότι διαγράψαμε τον λογαριασμό σας στην πλατφόρμα 'Oral-History.Digital' με όλα τα προσωπικά σας δεδομένα.\u003c/p\u003e\u003cp\u003eΕάν θέλετε να αποκτήσετε πρόσβαση στο 'Oral-History.Digital' ή σε οποιοδήποτε από τα αρχεία μαρτυριών που περιλαμβάνονται, μπορείτε να εγγραφείτε ξανά ανά πάσα στιγμή.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.reset_password_instructions.subject: "Oral-History.Digital. Βήματα για να ανακτήσετε τον κωδικό πρόσβασής σας."
  devise.mailer.revoke_block.subject: "Η πρόσβασή σας στην πλατφόρμα Oral-History.Digital"
  devise.mailer.revoke_block.text: "\u003cp\u003eΓεια σας %{user_display_name},\u003c/p\u003e\u003cp\u003eΣας ενημερώνουμε ότι η πρόσβαση σας στην πλατφόρμα Oral-History.Digital έχει αποκατασταθεί.\u003c/p\u003e\u003cp\u003eΜπορείτε πλέον να έχετε πρόσβαση στην πλατφόρμα.\u003c/p\u003e\u003cp\u003eΜε εκτίμηση\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
