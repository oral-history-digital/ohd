  devise.mailer.reject_project_access.subject: "Su solicitud de acceso para la aplicación '%{project_name}'"
  devise.mailer.reject_project_access.text: "\u003cp\u003eHola %{user_display_name},\u003c/p\u003e\u003cp\u003eHa solicitado el acceso para la aplicación '%{project_name}'.\u003c/p\u003e\u003cp\u003eLamentablemente, la revisión de sus datos arrojó que son insuficientes o no cumplen los %{tos_link}.\u003c/p\u003e\u003cp\u003ePuede modificar o completar sus datos a través del siguiente enlace.\u003c/p\u003e\u003cp\u003e%{correct_link}\u003c/p\u003e\u003cp\u003eSi necesita ayuda, contáctenos en %{mail_to}.\u003c/p\u003e\u003cp\u003eSaludos cordiales\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.remove.subject: "Eliminación de su cuenta"
  devise.mailer.remove.text: "\u003cp\u003eHola %{user_display_name},\u003c/p\u003e\u003cp\u003epor la presente le informamos de que hemos eliminado su cuenta de usuario/a de la plataforma 'Oral-History.Digital' con todos sus datos personales.\u003c/p\u003e\u003cp\u003eSi quiere acceder a Oral-History.Digital o a alguno de los archivos de entrevistas, puede volver a registrarse en cualquier momento.\u003c/p\u003e\u003cp\u003eSaludos cordiales\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
