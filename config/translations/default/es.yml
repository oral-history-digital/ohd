  devise.mailer.block.text: "\u003cp\u003eHola %{user_display_name},\u003c/p\u003e\u003cp\u003epor la presente le informamos de que su acceso a la plataforma 'Oral-History.Digital' ha sido bloqueado. Esto se debe al incumplimiento de los %{tos_link}.\u003c/p\u003e\u003cp\u003eSi tiene alguna duda, póngase en contacto con nosotros a través de %{mail_to}.\u003c/p\u003e\u003cp\u003eSaludos cordiales\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.block_project_access.subject: "Bloqueo de su cuenta"
  devise.mailer.block_project_access.text: "\u003cp\u003eHola %{user_display_name},\u003c/p\u003e\u003cp\u003ePor la presente le informamos de que su acceso a la aplicación '%{project_name}' ha sido bloqueado. Esto se debe al incumplimiento de los %{tos_link} del archivo.\u003c/p\u003e\u003cp\u003eSi tiene alguna duda, por favor, póngase en contacto con nosotros a través de %{mail_to}.\u003c/p\u003e\u003cp\u003eSaludos cordiales\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
