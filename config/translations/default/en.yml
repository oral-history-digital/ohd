  upload.explanation.bulk_metadata: "Download this spreadsheet template, fill in your data, save as csv and upload. Keep column number and names as well as field types. Languages should be given in english or in alpha2- or alpha3-codes. Use semicolon or tab as delimiter."
  upload.explanation.bulk_photos: "Download the import template, import your data, save it as a csv file and upload it. Retain the number and names of the columns as well as the field type. Please note that the file name in the import file must correspond exactly to the file name to be imported in upper/lower case. This also applies to the file extension: .jpg, .JPG, .jpeg etc. are different names. Language descriptions should either be in English or in Alpha2 or Alpha3 code. Delimiters should be either semicolon or tab. Compress the csv file together with the photos into a zip file and upload it (no subfolders in the zip file!)."
  upload.explanation.bulk_registry_entries: "Download this spreadsheet template, fill in your data, save as csv and upload. Keep column number and names as well as field types. Use semicolon or tab as delimiter."
  upload.explanation.bulk_texts: "Compress your protocoll- or biography-files into a zip file and upload. No subfolders in the zip-archive allowed. File names must be like InterviewID_Type_Language.ext, where type is 'bg' for biographies and 'prot' for protocolls. E.g. za123_prot_de.rtf or za007_bg_de.odt."
  upload.explanation.introduction: "First select what you want to import."
  upload.explanation.transcript: "When uploading transcripts, please ensure that the language selection matches the first language listed under “About the interview.” In bilingual interviews, the second language can only be used for display and filter selection. Translations must match the first/second translation language in order to be displayed in the archive. Please also ensure that the Speaker designations entered match the abbreviations in the column “Speaker|Sprecher“ in the transcript."
  upload.type.bulk_metadata: "Bulk Metadata Import"
