  update.zwar.tos.content_one: "Die Anwendung '%{archive_name}' ist von nun an Teil der Plattform Oral-History.Digital."
  update.zwar.tos.content_three: "Um das Interview-Archiv weiterhin nutzen zu können, müssen Sie diesen zustimmen:"
