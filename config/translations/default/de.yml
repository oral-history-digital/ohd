  devise.mailer.corrected_project_access_data.subject: "Korrigierte Benutzerdaten zur Prüfung"
  devise.mailer.grant_project_access.subject: "Freischaltung Ihres Zugangs zu der Anwendung '%{project_name}'"
  devise.mailer.grant_project_access.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003eSie haben nun Zugang zu der Anwendung '%{project_link}' für das von Ihnen angegebene Recherche-Anliegen.\u003c/p\u003e\u003cp\u003eBitte beachten Sie die Persönlichkeitsrechte der Interviewten und die %{tos_link} des Archivs.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
