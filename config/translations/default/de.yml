  modules.site_startpage.access.heading: "Anmeldung"
  modules.site_startpage.access.text: "Um die Persönlichkeitsrechte der Interviewten zu schützen, verlangen die meisten Archive eine Anmeldung. Bitte registrieren Sie sich in Oral-History.Digital und lassen Sie sich für einzelne Archive freischalten, um auf die vollständigen Interviews zugreifen zu können."
  modules.site_startpage.access_requested: "Freischaltung beantragt"
  modules.site_startpage.catalog.heading: "Katalog"
  modules.site_startpage.catalog.text1: "Der"
  modules.site_startpage.catalog.text2: "Katalog"
  modules.site_startpage.catalog.text3: "verzeichnet die Institutionen, Archive und Sammlungen. Die \u003cb\u003eArchive\u003c/b\u003e haben unterschiedliche Metadaten und Zugangsregelungen. \u003cb\u003eSammlungen\u003c/b\u003e sind einzelne Teilbestände innerhalb dieser Archive."
  modules.site_startpage.instructions: "Anleitung für die Redaktionsansicht"
  modules.site_startpage.introduction.text1: "\u003cb\u003eOral-History.Digital\u003c/b\u003e ist eine Erschließungs- und Recherche-Plattform für Audio- oder Video-Interviews mit Zeitzeuginnen und Zeitzeugen. Derzeit verzeichnet \u003cb\u003eOral-History.Digital\u003c/b\u003e"
  modules.site_startpage.introduction.text2: "Archive mit"
  modules.site_startpage.introduction.text3: "Sammlungen und"
  modules.site_startpage.introduction.text4: "Interviews von"
  modules.site_startpage.introduction.text5: "Institutionen. Das Portal ist noch im Aufbau. Hintergrund-Informationen finden Sie auf der \u003ca href=\"https://www.oral-history.digital\" target=\"_blank\" rel=\"noreferrer\"\u003ebegleitenden Webseite\u003c/a\u003e. Eine Anleitung bieten die \u003ca href=\"https://www.oral-history.digital/hilfe/index.html\" target=\"_blank\" rel=\"noreferrer\"\u003eHilfeseiten\u003c/a\u003e."
  modules.site_startpage.more_results: "Mehr Ergebnisse laden"
  modules.site_startpage.no_access: "Freischaltung erforderlich"
  modules.site_startpage.sample_archives: "Beispielarchive"
  modules.site_startpage.search.heading: "Suche"
  modules.site_startpage.search.text1: "Die"
  modules.site_startpage.search.text2: "Suche"
  modules.site_startpage.search.text3: "führt zu einzelnen Interviews aus verschiedenen Archiven. \u003cb\u003eFiltern\u003c/b\u003e können Sie z.B. nach Thema, Sprache oder Geschlecht. Im \u003cb\u003eVolltext\u003c/b\u003e können Sie nur in den  Archiven suchen, für die Sie freigeschaltet sind."
