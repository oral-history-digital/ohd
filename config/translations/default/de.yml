  devise.mailer.block.subject: "Sperrung Ihres Nutzer*innen-Accounts"
  devise.mailer.block.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003ehiermit teilen wir Ihnen mit, dass Ihr Zugang zu der Plattform 'Oral-History.Digital' gesperrt wurde. Dies erfolgt, wenn die %{tos_link} nicht beachtet wurden.\u003c/p\u003e\u003cp\u003eBei Rückfragen kontaktieren Sie uns bitte unter %{mail_to}.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.block_project_access.subject: "Sperrung Ihres Nutzer*innen-Accounts"
  devise.mailer.block_project_access.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003ehiermit teilen wir Ihnen mit, dass Ihr Zugang zu der Anwendung '%{project_name}' gesperrt wurde. Dies erfolgt, wenn die %{tos_link} des Archivs nicht beachtet wurden.\u003c/p\u003e\u003cp\u003eBei Rückfragen kontaktieren Sie uns bitte unter %{mail_to}.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
