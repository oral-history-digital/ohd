  devise.mailer.revoke_block.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003ehiermit teilen wir Ihnen mit, dass die Sperrung Ihres Zugangs zu der Plattform Oral-History.Digital aufgehoben wurde.\u003c/p\u003e\u003cp\u003eSie haben nun wieder Zugang zu der Plattform.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.revoke_project_access_block.subject: "Ihr Zugang zu der Anwendung '%{project_name}'"
  devise.mailer.revoke_project_access_block.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003ehiermit teilen wir Ihnen mit, dass die Sperrung Ihres Zugangs zu der Anwendung %{project_name} aufgehoben wurde.\u003c/p\u003e\u003cp\u003eSie haben nun wieder Zugang zu der Anwendung %{project_name}.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.terminate_project_access.subject: "Ihr Zugang zu der Anwendung '%{project_name}'"
  devise.mailer.terminate_project_access.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003eIhr Zugang zu der Anwendung '%{project_name}' war zeitlich befristet und ist nun beendet.\u003c/p\u003e\u003cp\u003eSie können gerne zu einem späteren Zeitpunkt erneut eine Freischaltung beantragen.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
