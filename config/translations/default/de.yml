  devise.mailer.reject_project_access.subject: "Ihr Antrag auf Freischaltung für die Anwendung '%{project_name}'"
  devise.mailer.reject_project_access.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003eSie haben eine Freischaltung für die Anwendung '%{project_name}' beantragt.\u003c/p\u003e\u003cp\u003eLeider hat die Überprüfung Ihrer Angaben ergeben, dass diese unzureichend sind oder nicht den %{tos_link} entsprechen.\u003c/p\u003e\u003cp\u003eUnter folgendem Link können Sie Ihre Angaben ändern oder ergänzen.\u003c/p\u003e\u003cp\u003e%{correct_link}\u003c/p\u003e\u003cp\u003eWenn Sie Unterstützung benötigen, kontaktieren Sie uns bitte unter %{mail_to}.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.remove.subject: "Löschung Ihres Nutzer*innen-Accounts"
  devise.mailer.remove.text: "\u003cp\u003eGuten Tag %{user_display_name},\u003c/p\u003e\u003cp\u003ehiermit teilen wir Ihnen mit, dass wir Ihren Nutzer*innen-Account für die Plattform 'Oral-History.Digital' mit allen personenbezogenen Daten gelöscht haben.\u003c/p\u003e\u003cp\u003eWenn Sie auf 'Oral-History.Digital' oder eines der enthaltenen Interview-Archive zugreifen möchten, können Sie sich jederzeit erneut registrieren.\u003c/p\u003e\u003cp\u003eMit freundlichen Grüßen\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
