  devise.mailer.block.subject: "Блокування вашого облікового запису"
  devise.mailer.block.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eПовідомляємо, що доступ до платформи Oral-History.Digital заблоковано. Це відбувається, коли не дотримуються %{tos_link} платформи.\u003c/p\u003e\u003cp\u003eЯкщо у вас виникнуть додаткові запитання, зв’яжіться з нами за адресою %{mail_to}.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.block_project_access.subject: "Підтвердити реєстрацію"
  devise.mailer.block_project_access.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eПовідомляємо, що доступ до програми '%{project_name}'заблоковано. Це відбувається, коли не дотримуються %{tos_link} архіву.\u003c/p\u003e\u003cp\u003eЯкщо у вас виникнуть додаткові запитання, зв’яжіться з нами за адресою %{mail_to}.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.confirmation_instructions.subject: "Підтвердження вашої реєстрації на Oral-History.Digital"
  devise.mailer.corrected_project_access_data.subject: "Korrigierte Benutzerdaten zur Prüfung"
  devise.mailer.grant_project_access.subject: "Активація вашого доступу до програми '%{project_name}'"
  devise.mailer.grant_project_access.text: "\u003cp\u003eДоброго дня %{user_display_name}, \u003c/p\u003e\u003cp\u003eТепер ви маєте доступ до програми '%{project_link}' для вказаного вами дослідницького наміру.\u003c/p\u003e\u003cp\u003eБудь ласка, поважайте права співбесідників на конфіденційність та %{tos_link} архівом %{tos_link}.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями \u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.new_email_confirmation_instructions.subject: "Bestätigung Ihrer neuen E-Mail-Adresse für Oral-History.Digital"
  devise.mailer.new_registration_info.subject: "Neuer Freischaltungsantrag zur Prüfung"
  devise.mailer.reject_project_access.subject: "Ваша заявка на активацію програми '%{project_name}'"
  devise.mailer.reject_project_access.text: "\u003cp\u003eДоброго дня %{user_display_name}, \u003c/p\u003e\u003cp\u003eВи надіслали запит на активацію програми '%{project_name}'. \u003c/p\u003e\u003cp\u003eНа жаль, перевірка вашої інформації виявила, що вона недостатня або не відповідає %{tos_link}.\u003c/p\u003e\u003cp\u003eВи можете скористатися наступним посиланням, щоб змінити або доповнити свою інформацію.\u003c/p\u003e\u003cp\u003e%{correct_link}p\u003e\u003cp\u003eЯкщо вам потрібна допомога, будь ласка, зв’яжіться з нами за адресою %{mail_to}.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.remove.subject: "Видалення облікового запису користувача"
  devise.mailer.remove.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eПовідомляємо вам, що ми видалили ваш обліковий запис користувача платформи Oral-History.Digital, включаючи всі особисті дані.\u003c/p\u003e\u003cp\u003eЯкщо ви бажаєте отримати доступ до Oral-History.Digital або одного з включених архівів інтерв’ю, ви можете будь-коли повторно зареєструватися.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.reset_password_instructions.subject: "Oral-History.Digital. Кроки для відновлення пароля."
  devise.mailer.revoke_block.subject: "Ваш доступ до платформи Oral-History.Digital"
  devise.mailer.revoke_block.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eповідомляємо, що доступ до платформи Oral-History.Digital розблоковано.\u003c/p\u003e\u003cp\u003eТепер ви знову можете отримати доступ до платформи.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003eOral-History.Digital\u003c/p\u003e"
  devise.mailer.revoke_project_access_block.subject: "Ваш доступ до програми '%{project_name}'"
  devise.mailer.revoke_project_access_block.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eповідомляємо, що доступ до програми %{project_name} розблоковано.\u003c/p\u003e\u003cp\u003eТепер ви знову можете отримати доступ до програми %{project_name}.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
  devise.mailer.terminate_project_access.subject: "Ваш доступ до програми '%{project_name}'"
  devise.mailer.terminate_project_access.text: "\u003cp\u003eДоброго дня %{user_display_name},\u003c/p\u003e\u003cp\u003eВаш доступ до додатку '%{project_name}' був обмежений за часом і зараз закінчився.\u003c/p\u003e\u003cp\u003eВи можете подати повторну заявку пізніше.\u003c/p\u003e\u003cp\u003eЗ найкращими побажаннями\u003c/p\u003e\u003cp\u003e%{project_name}\u003c/p\u003e"
